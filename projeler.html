  <link rel="stylesheet" href="style.css">

  <style>
    .project-hero{
      padding: 80px 0 80px;
    }

    .project-slider-wrap{
      position: relative;
      margin-top: 26px;
    }

    .project-slider{
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
      min-height: 580px;
    }

    .project-slides{
      display: flex;
      transition: transform .100s ease;
      will-change: transform;
    }

    .project-slide{
      min-width: 100%;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      align-items: center;
      gap: 0;
      min-height: 580px;
      background: linear-gradient(180deg,#ffffff 0%, #ffffff 100%);
    }

    .project-slide-image{
      height: 100%;
      min-height: 580px;
      overflow: hidden;
      background: #ffffff;
    }

    .project-slide-image img{
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .project-slide-content{
      padding: 42px;
    }

    .project-slide-badge{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #ffffff;
      background: #ffffff;
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .project-slide-content h1,
    .project-slide-content h2{
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.04;
      letter-spacing: -1.5px;
      color: var(--title);
    }

    .project-slide-content p{
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
    }

    .project-meta{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .project-meta span{
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #dce7f1;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
    }

    .slider-arrow{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      color: var(--title);
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 5;
      transition: .2s ease;
    }

    .slider-arrow:hover{
      transform: translateY(-50%) scale(1.04);
    }

    .slider-prev{ left: 18px; }
    .slider-next{ right: 18px; }

    .slider-dots{
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .slider-dot{
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      background: #ffffff;
      cursor: pointer;
      transition: .25s ease;
    }

    .slider-dot.active{
      width: 34px;
      border-radius: 999px;
      background: linear-gradient(135deg,var(--accent-3),var(--accent));
    }

    .projects-grid-section{
      padding-top: 40px;
    }

    .projects-mini-grid{
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 22px;
      margin-top: 24px;
    }

    .project-mini-card{
      overflow: hidden;
      padding: 0;
    }

    .project-mini-card img{
      width: 100%;
      aspect-ratio: 16/11;
      object-fit: cover;
      border-bottom: 1px solid var(--line);
    }

    .project-mini-body{
      padding: 20px;
    }

    .project-mini-body h3{
      margin: 0 0 10px;
      color: var(--title);
      font-size: 21px;
    }

    .project-mini-body p{
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    @media (max-width: 1100px){
      .project-slide{
        grid-template-columns: 1fr;
      }

      .project-slide-image{
        min-height: 360px;
      }

      .project-slider{
        min-height: auto;
      }

      .project-slide{
        min-height: auto;
      }

      .projects-mini-grid{
        grid-template-columns: repeat(2,1fr);
      }
    }

    @media (max-width: 768px){
      .project-slide-content{
        padding: 24px;
      }

      .project-slide-image{
        min-height: 280px;
      }

      .slider-arrow{
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .slider-prev{ left: 10px; }
      .slider-next{ right: 10px; }

      .projects-mini-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
